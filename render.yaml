# Render deployment configuration
services:
  - type: web
    name: gfd-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    healthCheckPath: /health
    autoDeploy: true

  - type: worker
    name: gfd-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    autoDeploy: true
